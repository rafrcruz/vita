name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Varredura semanal (segunda 05:23 UTC) para pegar novas regras/CVEs em código já mergeado.
    - cron: "23 5 * * 1"

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # security-extended: conjunto amplo de queries DE SEGURANÇA (sem regras de
          # estilo/manutenção, que gerariam ruído pouco útil neste projeto).
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
