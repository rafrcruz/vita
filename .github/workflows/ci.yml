name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    name: Lint, typecheck e testes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # para a action comentar o resumo de cobertura no PR
    env:
      NODE_ENV: test
      # Valores dummy só para o boot/validação de env nos testes (não conectam a serviços reais).
      JWT_SECRET: ci-dummy-jwt-secret-com-32-mais-caracteres
      DATABASE_URL: postgresql://user:pass@localhost:5432/vita?sslmode=require
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      # Comenta/atualiza um resumo de cobertura no PR. Informativo — não falha o build.
      - name: Report coverage
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2

  audit:
    name: Auditoria de dependências (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Só dependências de produção (--omit=dev) e só high/critical: reflete a
      # superfície real de ataque do app em runtime, sem o ruído de tooling de
      # build (esbuild/vite/vitest etc., que não vão para produção). Complementa o
      # Dependabot (que abre PRs de correção). NÃO é required na branch protection,
      # para não bloquear merges por CVE em dep transitiva sem relação com o PR.
      - run: npm audit --omit=dev --audit-level=high

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bundle-check:
    name: Frescor do bundle da API
    runs-on: ubuntu-latest
    # Informativo (não-required na branch protection): detecta bundle serverless
    # desatualizado em relação ao src. O bundle (apps/api/api/index.js) é versionado
    # e o esbuild é reprodutível, então um diff aqui indica que faltou rebuildar.
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Recompila só o bundle (sem db:migrate) e falha se diferir do commitado.
      - run: npm -w @vita/api run bundle
      - name: Verificar se o bundle commitado está atualizado
        run: |
          if ! git diff --quiet -- apps/api/api/index.js; then
            echo "::error::apps/api/api/index.js está desatualizado. Rode 'npm -w @vita/api run bundle' e commite o resultado."
            git --no-pager diff -- apps/api/api/index.js
            exit 1
          fi
